                        <p class="font-body-lg text-body-lg text-on-surface-variant mb-3 font-medium">${a.position ? a.position + ' di ' + a.institutionName : a.careerStatus || ''}</p>
                        <div class="flex flex-wrap items-center justify-center md:justify-start gap-4 text-on-surface-variant/80">
                            <span class="flex items-center gap-1 font-label-md text-label-md"><span class="material-symbols-outlined text-[20px]">location_on</span>${a.province || '-'}</span>
                            <span class="flex items-center gap-1 font-label-md text-label-md"><span class="material-symbols-outlined text-[20px]">mail</span>${a.email}</span>
                            <span class="flex items-center gap-1 font-label-md text-label-md"><span class="material-symbols-outlined text-[20px]">phone</span>${a.phone}</span>
                        </div>
                    </div>
                    <div class="flex gap-3 pb-2">
                        <a href="mailto:${a.email}" class="flex items-center gap-2 px-6 py-3 bg-primary text-on-primary rounded-xl font-label-md text-label-md hover:bg-primary/90 transition-all shadow-lg shadow-primary/20"><span class="material-symbols-outlined text-[20px]">email</span>Kirim Email</a>
                        <a href="tel:${a.phone.replace(/[^0-9+]/g, '')}" class="flex items-center gap-2 px-6 py-3 bg-surface-container-lowest text-primary border border-primary/20 rounded-xl font-label-md text-label-md hover:bg-surface-container-low transition-all"><span class="material-symbols-outlined text-[20px]">phone</span>Hubungi</a>
                    </div>
                </div>
            </div>
        </header>
        <div class="max-w-container-max mx-auto px-gutter -mt-10 pb-20">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-8 space-y-8">
                    <!-- Data Pribadi -->
                    <section class="glass-card rounded-2xl p-8 shadow-sm">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="w-10 h-10 rounded-lg bg-primary-fixed-dim flex items-center justify-center"><span class="material-symbols-outlined text-primary">badge</span></div>
                            <h2 class="font-headline-md text-headline-md">Data Pribadi</h2>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div class="flex items-start gap-3"><span class="material-symbols-outlined text-primary mt-0.5">badge</span><div><p class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">NIK</p><p class="font-body-md text-body-md text-on-surface">${a.nik || '-'}</p></div></div>
                            <div class="flex items-start gap-3"><span class="material-symbols-outlined text-primary mt-0.5">person</span><div><p class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">Nama Lengkap</p><p class="font-body-md text-body-md text-on-surface">${a.name}</p></div></div>
                            <div class="flex items-start gap-3"><span class="material-symbols-outlined text-primary mt-0.5">${a.gender === 'Laki-laki' ? 'male' : 'female'}</span><div><p class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">Jenis Kelamin</p><p class="font-body-md text-body-md text-on-surface">${a.gender}</p></div></div>
                            <div class="flex items-start gap-3"><span class="material-symbols-outlined text-primary mt-0.5">favorite</span><div><p class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">Status Pernikahan</p><p class="font-body-md text-body-md text-on-surface">${a.maritalStatus || '-'}</p></div></div>
                            <div class="flex items-start gap-3"><span class="material-symbols-outlined text-primary mt-0.5">phone</span><div><p class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">No. HP/WhatsApp</p><p class="font-body-md text-body-md text-on-surface">${a.phone}</p></div></div>
                            <div class="flex items-start gap-3"><span class="material-symbols-outlined text-primary mt-0.5">email</span><div><p class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">Email Aktif</p><p class="font-body-md text-body-md text-on-surface">${a.email}</p></div></div>
                            <div class="flex items-start gap-3"><span class="material-symbols-outlined text-primary mt-0.5">location_on</span><div><p class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">Provinsi</p><p class="font-body-md text-body-md text-on-surface">${a.province || '-'}</p></div></div>
                            <div class="flex items-start gap-3 md:col-span-2"><span class="material-symbols-outlined text-primary mt-0.5">home</span><div><p class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">Alamat Domisili</p><p class="font-body-md text-body-md text-on-surface">${a.address || '-'}</p></div></div>
                        </div>
                    </section>
                    <!-- Pendidikan -->
                    <section class="glass-card rounded-2xl p-8 shadow-sm">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="w-10 h-10 rounded-lg bg-primary-fixed-dim flex items-center justify-center"><span class="material-symbols-outlined text-primary">school</span></div>
                            <h2 class="font-headline-md text-headline-md">Latar Belakang Pendidikan</h2>
                        </div>
                        <div class="space-y-4">${educationRows}</div>
                    </section>
                    <!-- Sertifikat -->
                    <section class="glass-card rounded-2xl p-8 shadow-sm">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="w-10 h-10 rounded-lg bg-primary-fixed-dim flex items-center justify-center"><span class="material-symbols-outlined text-primary">verified</span></div>
                            <h2 class="font-headline-md text-headline-md">Sertifikat Kompetensi</h2>
                        </div>
                        <div class="space-y-4">${certRows}</div>
                    </section>
                    <!-- Organisasi -->
                    <section class="glass-card rounded-2xl p-8 shadow-sm">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="w-10 h-10 rounded-lg bg-primary-fixed-dim flex items-center justify-center"><span class="material-symbols-outlined text-primary">groups</span></div>
                            <h2 class="font-headline-md text-headline-md">Pengalaman Organisasi</h2>
                        </div>
                        <div class="space-y-4">${orgRows}</div>
                    </section>
                </div>
                <div class="lg:col-span-4 space-y-8">
                    <!-- Karir -->
                    <section class="glass-card rounded-2xl p-8 shadow-sm">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="w-10 h-10 rounded-lg bg-primary-fixed-dim flex items-center justify-center"><span class="material-symbols-outlined text-primary">work</span></div>
                            <h2 class="font-headline-md text-headline-md">Profil Pekerjaan</h2>
                        </div>
                        <div class="space-y-4">
                            <div><span class="font-label-sm text-label-sm text-secondary uppercase block mb-1">Status</span><span class="inline-flex px-3 py-1.5 bg-primary-container text-on-primary-container rounded-full font-label-md text-label-md">${a.careerStatus}${a.careerOther ? ' - ' + a.careerOther : ''}</span></div>
                            ${a.institutionName ? `<div class="mt-4"><span class="font-label-sm text-label-sm text-secondary uppercase block mb-1">Instansi/Perusahaan</span><p class="font-body-lg text-body-lg font-bold text-on-surface">${a.institutionName}</p></div>` : ''}
                            ${a.institutionField ? `<div class="mt-3"><span class="font-label-sm text-label-sm text-secondary uppercase block mb-1">Bidang Instansi</span><p class="font-body-md text-body-md text-on-surface">${a.institutionField}</p></div>` : ''}
                            ${a.position ? `<div class="mt-3"><span class="font-label-sm text-label-sm text-secondary uppercase block mb-1">Jabatan</span><p class="font-body-lg text-body-lg font-bold text-primary">${a.position}</p></div>` : ''}
                        </div>
                    </section>
                    <!-- Kontak -->
                    <section class="glass-card rounded-2xl p-8 shadow-sm">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="w-10 h-10 rounded-lg bg-primary-fixed-dim flex items-center justify-center"><span class="material-symbols-outlined text-primary">contacts</span></div>
                            <h2 class="font-headline-md text-headline-md">Kontak & Media Sosial</h2>
                        </div>
                        <div class="space-y-3">${socialIcons}</div>
                    </section>
                    ${businessRows ? `<section class="space-y-6">${businessRows}</section>` : ''}
                    <a href="index.html" class="flex items-center justify-center gap-2 w-full py-3 bg-surface-container-high text-on-surface rounded-xl font-label-md text-label-md hover:bg-surface-container transition-all">
                        <span class="material-symbols-outlined">arrow_back</span>Kembali ke Daftar Alumni
                    </a>
                </div>
            </div>
        </div>`;
}

renderProfile(getAlumni());

window.addEventListener('scroll', () => {
    const nav = document.querySelector('nav');
    if (window.scrollY > 20) {
        nav.classList.add('shadow-md');
        nav.classList.replace('bg-surface-container-lowest', 'bg-white/90');
        nav.style.backdropFilter = 'blur(10px)';
    } else {
        nav.classList.remove('shadow-md');
        nav.classList.replace('bg-white/90', 'bg-surface-container-lowest');
        nav.style.backdropFilter = 'none';
    }
});
</script>
</body></html>
