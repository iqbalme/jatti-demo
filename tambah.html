<input class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-white font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-all" id="dateOfBirth" name="dateOfBirth" required type="date"/>
</div>

<div>

<label class="flex items-center gap-2 cursor-pointer">
<input class="w-4 h-4 text-primary focus:ring-primary" name="gender" required type="radio" value="Laki-laki"/>
<span class="font-body-md text-body-md text-on-surface">Laki-laki</span>

<input class="w-4 h-4 text-primary focus:ring-primary" name="gender" type="radio" value="Perempuan"/>
<span class="font-body-md text-body-md text-on-surface">Perempuan</span>

</div>

<div>

<option value="Korea Selatan">Korea Selatan</option>
<option value="Amerika Serikat">Amerika Serikat</option>
<option value="Inggris">Inggris</option>
<option value="Belanda">Belanda</option>
<option value="Jerman">Jerman</option>

<div>

<script>
(function() {
    const yearSelect = document.getElementById('graduationYear');
    const currentYear = new Date().getFullYear();
    for (let y = currentYear; y >= 1980; y--) {
        const opt = document.createElement('option');
        opt.value = y.toString();
        opt.textContent = y;
        yearSelect.appendChild(opt);
    }

    const skills = [];
    const skillsInput = document.getElementById('skillsInput');
    const addSkillBtn = document.getElementById('addSkillBtn');
    const skillsContainer = document.getElementById('skillsContainer');
    const skillsHidden = document.getElementById('skills');

    function renderSkills() {
        skillsContainer.innerHTML = skills.map((s, i) =>
            `<span class="inline-flex items-center gap-1 px-3 py-1.5 bg-secondary-container text-on-secondary-container rounded-full font-label-md text-label-md">
                ${s}
                <button type="button" class="skill-remove text-on-secondary-container/60 hover:text-on-secondary-container" data-index="${i}">
                    <span class="material-symbols-outlined text-[14px]">close</span>
                </button>
            </span>`
        ).join('');
        skillsHidden.value = JSON.stringify(skills);
        document.querySelectorAll('.skill-remove').forEach(btn => {
            btn.addEventListener('click', function() {
                const idx = parseInt(this.dataset.index);
                skills.splice(idx, 1);
                renderSkills();
            });
        });
    }

    addSkillBtn.addEventListener('click', function() {
        const val = skillsInput.value.trim();
        if (val && !skills.includes(val)) {
            skills.push(val);
            skillsInput.value = '';
            renderSkills();
        }
    });
    skillsInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            addSkillBtn.click();
        }
    });

    const form = document.getElementById('alumniForm');
    const formMessage = document.getElementById('formMessage');

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        formMessage.classList.add('hidden');
        formMessage.classList.remove('bg-green-50', 'text-green-700', 'bg-red-50', 'text-red-700', 'border', 'border-green-200', 'border-red-200');

        const formData = new FormData(form);
        const genderEl = document.querySelector('input[name="gender"]:checked');

        if (!genderEl) {
            showMessage('Silakan pilih jenis kelamin.', 'error');
            return;
        }

        const newAlumni = {
            id: Date.now(),
            name: formData.get('name').trim(),
            dateOfBirth: formatDate(formData.get('dateOfBirth')),
            gender: genderEl.value,
            country: formData.get('country'),
            university: formData.get('university').trim(),
            major: formData.get('major').trim(),
            graduationYear: formData.get('graduationYear'),
            address: formData.get('address').trim(),
            phone: formData.get('phone').trim(),
            email: formData.get('email').trim(),
            title: formData.get('title').trim() || '-',
            company: formData.get('company').trim() || '-',
            skills: skills.length > 0 ? skills : ['-'],
            status: formData.get('status'),
            bio: formData.get('bio').trim() || 'Belum ada bio.'
        };

        const existing = JSON.parse(localStorage.getItem('alumniData') || '[]');
        existing.push(newAlumni);
        localStorage.setItem('alumniData', JSON.stringify(existing));

        showMessage('Data alumni berhasil disimpan! Mengalihkan ke halaman utama...', 'success');

        setTimeout(() => {
            window.location.href = 'index.html';
        }, 1500);
    });

    function formatDate(dateStr) {
        if (!dateStr) return '';
        const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
                        'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        const d = new Date(dateStr + 'T00:00:00');
        return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
    }

    function showMessage(msg, type) {
        formMessage.textContent = msg;
        formMessage.classList.remove('hidden');
        if (type === 'success') {
            formMessage.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-200');
        } else {
            formMessage.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
        }
    }
})();
</script>
